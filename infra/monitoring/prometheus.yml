global:
  scrape_interval: 15s       # Coleta métricas a cada 15 segundos
  evaluation_interval: 15s   # Avalia regras de alerta a cada 15 segundos

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Métricas do app Streamlit (diabetes-app)
  - job_name: 'diabetes-app'
    static_configs:
      - targets: ['app:8501']
    metrics_path: '/_stcore/health'

  # Métricas do Ollama (LLM llama3.2:1b)
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: '/api/version'

  # Métricas do servidor Linux (CPU, memória, disco)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Métricas do próprio Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
